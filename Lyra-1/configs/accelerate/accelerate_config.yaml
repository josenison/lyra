compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU
enable_cpu_affinity: false
downcast_bf16: 'no'
gpu_ids: all
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
# Reduced to 4 GPUs for my local workstation (only have 4x RTX 3090)
num_processes: 4
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
# Enable debug mode when troubleshooting hangs or NCCL errors
# debug: true
